<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>生日快乐</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            overflow: hidden;
            /* 全局换成这种超级可爱的泡泡手写字体 */
            font-family: 'ZCOOL KuaiLe', 'Comic Sans MS', cursive;
            position: relative;
            background: url('fig.png') center/cover no-repeat;
            background-color: #fdf2e3; 
        }

        #startScreen {
            position: fixed;
            top: 0; left: 0;
            width: 100vw; height: 100vh;
            background: rgba(255, 225, 232, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .start-btn {
            padding: 18px 35px;
            font-size: 24px; 
            font-family: inherit;
            font-weight: bold;
            background-color: #ff6b81;
            color: white;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(255, 107, 129, 0.4);
            animation: pulse 1.5s infinite;
            outline: none;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 8px 25px rgba(255, 107, 129, 0.4); }
            50% { transform: scale(1.05); box-shadow: 0 12px 35px rgba(255, 107, 129, 0.6); }
            100% { transform: scale(1); box-shadow: 0 8px 25px rgba(255, 107, 129, 0.4); }
        }

        /* 飘落的小气泡弹窗（保持渐变色和淡化消失） */
        .blessing-card {
            position: absolute;
            width: auto;
            min-width: 140px;
            max-width: 220px;
            padding: 15px 25px;
            border-radius: 25px; 
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
            font-size: 20px; /* 字体稍微调大，配合新字体 */
            color: #555; 
            opacity: 0;
            animation: popUp 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        .fade-out {
            animation: fadeOutAnim 1.5s forwards !important;
        }

        @keyframes popUp {
            0% { opacity: 0; transform: scale(0.5) translateY(20px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        @keyframes fadeOutAnim {
            0% { opacity: 1; transform: scale(1); }
            100% { opacity: 0; transform: scale(0.8); } 
        }

        /* 👑 终极压轴文字：纯文字贴纸特效（无弹窗背景） */
        .final-text {
            position: absolute;
            bottom: 12%; 
            left: 50%;
            transform: translateX(-50%) scale(0.5); 
            width: 100%; 
            text-align: center;
            
            /* 放大的字号 */
            font-size: 38px; 
            line-height: 1.5;
            
            /* 可爱的桃红色 */
            color: #ff6b81; 
            
            /* 重点：利用多重文字阴影，打造出类似图片里的白色贴纸描边 + 底部发光效果 */
            text-shadow: 
                3px 3px 0 #fff, -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff,
                0px 3px 0 #fff, 0px -3px 0 #fff, 3px 0px 0 #fff, -3px 0px 0 #fff,
                0 12px 25px rgba(255, 107, 129, 0.7); /* 浪漫的发光底影 */
                
            opacity: 0;
            z-index: 99999; 
            animation: popUpCenter 1s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popUpCenter {
            0% { opacity: 0; transform: translateX(-50%) scale(0.5) translateY(30px); }
            100% { opacity: 1; transform: translateX(-50%) scale(1) translateY(0); }
        }
    </style>
</head>
<body>

    <div id="startScreen">
        <button class="start-btn" onclick="startSurprise()">~请我的公主点击开启~</button>
    </div>

    <audio id="bgm" src="happy.mp3" loop preload="auto"></audio>

    <script>
        const phrases = [
            "今天也要开心哦", "梦想都会实现", "每天都要闪闪亮", 
            "愿烦恼都走开", "我爱你~宝宝~", "祝你生日开心", 
            "生日好心情", "记得多开心", "记得吃蛋糕", 
            "你是最棒哒！", "你是最最最漂亮哒", "幸运加一再加一", 
            "天天开心", "生日快乐呀"
        ];

        const backgrounds = [
            "linear-gradient(135deg, #fbc2eb 0%, #a6c1ee 100%)", 
            "linear-gradient(135deg, #fdcbf1 0%, #e6dee9 100%)", 
            "linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%)", 
            "linear-gradient(135deg, #84fab0 0%, #8fd3f4 100%)", 
            "#ffecd2", "#fce7f3", "#e0f2fe", "#fef3c7"  
        ];

        let zIndexCounter = 10;
        let cardCount = 0;
        const maxCards = 35; 
        let intervalId = null;

        function createCard() {
            if (cardCount >= maxCards) return;

            const card = document.createElement('div');
            card.classList.add('blessing-card'); 

            const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
            const randomBg = backgrounds[Math.floor(Math.random() * backgrounds.length)];

            card.style.background = randomBg;
            card.innerHTML = randomPhrase;

            const cardWidth = 200;
            const cardHeight = 80;
            const maxX = window.innerWidth - cardWidth;
            const maxY = window.innerHeight - cardHeight;
            
            // 避开屏幕最下方，为最终文字留出空间
            const randomX = Math.max(10, Math.floor(Math.random() * (maxX - 20)));
            const randomY = Math.max(10, Math.floor(Math.random() * (maxY - 180)));

            card.style.left = randomX + 'px';
            card.style.top = randomY + 'px';
            card.style.zIndex = zIndexCounter++;

            document.body.appendChild(card);
            cardCount++;

            setTimeout(() => {
                card.classList.add('fade-out');
                setTimeout(() => card.remove(), 1500); 
            }, 2500);

            if (cardCount >= maxCards && intervalId) {
                clearInterval(intervalId);
                setTimeout(showFinalText, 3500);
            }
        }

        // 升级：去除弹窗框，直接显示超大号贴纸文字
        function showFinalText() {
            const finalText = document.createElement('div');
            finalText.classList.add('final-text');
            
            finalText.innerHTML = `
                祝我<br>
                最最最最最爱的宝宝~<br>
                22岁生日快乐！！！
            `;
            
            document.body.appendChild(finalText);
        }

        function startSurprise() {
            const bgm = document.getElementById('bgm');
            bgm.play().catch(error => {
                console.log("播放失败", error);
                alert("播放音乐失败，请检查手机音量或静音键噢~");
            });

            const startScreen = document.getElementById('startScreen');
            startScreen.style.opacity = '0';
            setTimeout(() => {
                startScreen.style.display = 'none';
            }, 500);

            for(let i=0; i<3; i++) {
                setTimeout(createCard, i * 200);
            }
            intervalId = setInterval(createCard, 600);
        }
    </script>

</body>
</html>
